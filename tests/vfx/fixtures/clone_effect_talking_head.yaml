# VFX Manual — clone_effect_talking_head
# Conforms to MANUAL_SCHEMA.md (structured fields are what the tool consumes).

id: clone_effect_talking_head
technique_primitive: overlay_bg_removal_clone
title: Clone Effect (Talking-Head, Auto BG Removal)
difficulty: beginner
aspect_ratio: '9:16'
gear_required:
  - tripod
  - lighting
props_required:
  - chair
result_description: Two copies of you in one shot — you sit pointing, and your clone steps in and sits
  beside you.
source: Elly Walton (@elly.walton)
source_url: https://www.instagram.com/reel/DVFUotSjbEp/
is_ai_generated: false
tool: CapCut
inputs:
  - name: pointing_clip
    what_to_film: Sit, point to where the clone will be, then step out of frame.
    capture_requirements:
      locked_off: true
      green_screen: false
      framing: leave the clone's seat empty
    acceptance_checks:
      - camera_locked_off
      - min_duration
    variance_tolerance:
      camera_shift_px: 8
      min_seconds: 2
  - name: stepin_clip
    what_to_film: Step into frame from the side and sit in the empty seat.
    capture_requirements:
      locked_off: true
    acceptance_checks:
      - camera_locked_off
    variance_tolerance:
      camera_shift_px: 8
edit_steps:
  - action: import
    channel: structural
    target: both clips
  - action: overlay
    channel: structural
    target: stepin_clip
    params:
      track: 2
  - action: position
    channel: structural
    target: stepin_clip
    params:
      note: directly under the pointing clip
  - action: duplicate
    channel: structural
    target: pointing_clip
    params:
      to_track: 3
  - action: remove_background
    channel: ui
    target: top pointing clip
    capcut_feature: Remove Background → Auto Removal
    params:
      mode: auto
result:
  description: Clone sits beside you with no hard seam.
  success_criteria:
    - Two people visible simultaneously
    - Clean cutout edge, no flicker
narration_transcript: I'm going to show you how to do the cloning effect. Actually, she's going to show
  you how to do the cloning effect. Let's go. You'll need a clip of yourself sitting in a chair, pointing
  to your clones and stepping out. Then you'll need a second clip of you stepping into the frame sitting
  down in the chair. Open up CapCut and import both of your clips. Scroll to the second clip where you're
  coming into the frame. Select your clip and in your editing tool, select Overlay. Drag your second clip
  underneath your first clip where you're pointing to your clone. Select your first clip and in your editing
  tool, select Duplicate and in your editing tools, scroll to Overlay, select Overlay. Now drag that overlay
  right underneath the first clip. In your editing tools, scroll to Remove Background, select Auto Removal.
  This removes the background of the first clip, allowing you to see your clone from the second clip.
  And there you have it, a fun clone effect for your next Talking Head video.
