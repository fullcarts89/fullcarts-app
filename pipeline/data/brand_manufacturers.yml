# Hand-curated brand → manufacturer (corporate parent) seed.
#
# Loaded by pipeline/scripts/seed_manufacturers.py, which idempotently
# UPDATEs product_entities.manufacturer for every row whose brand matches
# (case-insensitive). The corporate_tree view (migration 056) rolls up
# from there onto /insights.
#
# Matching rules:
#   - brand: required. Case-insensitive equality against product_entities.brand.
#     Multiple rows can share the same canonical brand (different spellings,
#     punctuation, or accent variants).
#   - category: optional. When present, the row only matches entities whose
#     `category` column is a case-insensitive substring match. Used to
#     disambiguate (e.g. Dove personal care = Unilever, Dove candy = Mars).
#   - When two rows could both match an entity, the one with a category
#     filter wins over the generic row.
#
# When you add a brand here, please cite the parent in a comment if it's
# not obvious (spin-offs and brand swaps are frequent in CPG).

