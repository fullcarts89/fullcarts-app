name: Scrape Non-Reddit Sources

on:
  schedule:
    - cron: '15 */12 * * *'  # Every 12 hours, offset from Reddit scraper
  workflow_dispatch:
    inputs:
      sources:
        description: 'Which scrapers to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - news-only
          - openfoodfacts-only
      dry_run:
        description: 'Dry run (no database writes)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  scrape-news:
    if: >-
      github.event.inputs.sources == 'all' ||
      github.event.inputs.sources == 'news-only' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Scrape Google News RSS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m backend.scrapers.news_scraper $FLAGS

  check-openfoodfacts:
    if: >-
      github.event.inputs.sources == 'all' ||
      github.event.inputs.sources == 'openfoodfacts-only' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check Open Food Facts for weight changes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m backend.scrapers.openfoodfacts_scraper $FLAGS

  detect-changes:
    needs: [scrape-news, check-openfoodfacts]
    if: >-
      always() &&
      (needs.scrape-news.result == 'success' || needs.check-openfoodfacts.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Promote and detect changes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -m backend.jobs.promote_staging --include-reviewed
          python -m backend.jobs.change_detector
