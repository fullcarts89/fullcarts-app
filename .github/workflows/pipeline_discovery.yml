name: "Pipeline \u2014 Discovery"
on:
  schedule:
    - cron: "0 2 * * 0"   # Weekly on Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      scraper:
        description: "Which discovery scraper to run"
        required: true
        type: choice
        options:
          - off_discovery
          - kroger_discovery
          - walmart_discovery
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        scraper:
          - off_discovery
          - kroger_discovery
          - walmart_discovery
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: "Run ${{ matrix.scraper }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
          WALMART_CONSUMER_ID: ${{ secrets.WALMART_CONSUMER_ID }}
          WALMART_PRIVATE_KEY: ${{ secrets.WALMART_PRIVATE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline ${{ matrix.scraper }} $FLAGS
