name: "Pipeline \u2014 Kroger API"
on:
  schedule:
    - cron: "0 4 * * 0"  # Weekly on Sunday at 04:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  poll-kroger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run Kroger weekly poll
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline kroger $FLAGS
      - name: Analyze Kroger changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m pipeline.scripts.analyze_kroger_changes
