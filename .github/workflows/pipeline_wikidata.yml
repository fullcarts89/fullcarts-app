name: "Pipeline — Wikidata Manufacturer Backfill"
on:
  schedule:
    # Sundays 06:00 UTC — Wikidata is slow per-brand (1s+ politeness),
    # so we run weekly. Each run handles up to 200 brands, so the full
    # ~1.2k-brand catalog converges in roughly 6 weeks. Re-runs are
    # safe (manufacturer IS NULL filter keeps already-resolved rows
    # out of the queue).
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean
      limit:
        description: "Max brands to resolve this run"
        required: false
        default: "200"
        type: string

permissions:
  contents: read

jobs:
  backfill-manufacturers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Backfill manufacturer from Wikidata
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS="--limit ${{ github.event.inputs.limit || '200' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python -m pipeline.scripts.wikidata_manufacturer_backfill $FLAGS
