name: "Validate — OFF image backfill (temporary)"

# Temporary one-off workflow. Fires on push to the feature branch to
# exercise the new OFF live-API fallback in backfill_entity_images.py.
# Runs --dry-run so no rows are mutated. Will be deleted from the
# branch after the run completes.

on:
  push:
    branches:
      - claude/continue-fullcarts-rEYSi

permissions:
  contents: read

jobs:
  validate-off-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Dry-run unit tests
        run: python3 -m pytest pipeline/tests/test_backfill_entity_images.py -v
      - name: Backfill entity images (dry-run)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        # Dry-run so the run produces the by_source breakdown in the
        # logs without mutating product_entities. Limit 200 keeps the
        # OFF API calls bounded (~5min worst case at ~1.5s/req).
        run: |
          python3 -m pipeline.scripts.backfill_entity_images --dry-run --limit 200 2>&1 | tee /tmp/backfill.log
          echo "## OFF backfill validation — dry run" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E "Found|RESULTS|updated|still_missing|errors|by_source|claim:|kroger_api:|walmart:|openfoodfacts:|off_api_live:|gdelt_socialimage:" /tmp/backfill.log >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
