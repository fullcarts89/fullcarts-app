name: "Pipeline \u2014 News Scrapers"
on:
  schedule:
    - cron: "15 */12 * * *"  # Every 12 hours at :15
  workflow_dispatch:
    inputs:
      source:
        description: "Which source to scrape"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - news-only
          - gdelt-only
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  scrape-news:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.source == 'all' ||
      github.event.inputs.source == 'news-only'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run Google News RSS scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline news_rss $FLAGS

  scrape-gdelt:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.source == 'all' ||
      github.event.inputs.source == 'gdelt-only'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run GDELT scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline gdelt $FLAGS
