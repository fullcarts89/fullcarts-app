name: "Pipeline — UPC Backfill"
on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC (staggered from other scrapers)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  upc-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run UPC backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline upc_backfill $FLAGS
