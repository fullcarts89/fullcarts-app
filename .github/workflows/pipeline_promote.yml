name: "Pipeline — Promote Claims"

on:
  schedule:
    - cron: "0 12 * * *"  # Daily at 12:00 UTC (after extraction at ~6AM)
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  promote-claims:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Auto-decline low-quality pending claims
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        # Clears junk before auto-approve evaluates the queue:
        #  - news/gdelt with no brand or no size/price change
        #  - reddit with no image (text-only complaints)
        #  - openfoodfacts catalog rows that aren't actually shrinkflation
        # Summary of declined claims lands in the workflow's job summary.
        run: python3 -m pipeline.scripts.auto_decline_pending
      - name: Auto-approve high-confidence claims
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        # --approve-only so this step doesn't run promotion; the dedicated
        # promote step below picks up everything (auto-approved + manually
        # approved) in one pass. Summary of approved claims lands in the
        # workflow's job summary.
        run: python3 -m pipeline.scripts.auto_approve_claims --threshold 90 --approve-only
      - name: Clean up stuck approved claims
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        # Resolves claims whose matched_entity_id was set by an older code
        # path but whose status never advanced past 'approved'. Either folds
        # into the matching published_change as evidence, or clears the entity
        # link so the promote step below picks them up cleanly. No-op on a
        # healthy queue.
        run: python3 -m pipeline.scripts.cleanup_stuck_approved
      - name: Promote approved claims
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 pipeline/scripts/promote_claims.py
      - name: Backfill entity images
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 -m pipeline.scripts.backfill_entity_images --limit 500
