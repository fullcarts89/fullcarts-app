name: "Pipeline — Claim Extraction"
on:
  workflow_dispatch:
    inputs:
      source_type:
        description: "Source type to extract (reddit, news, or both)"
        required: false
        default: ""
        type: string
      limit:
        description: "Max items to process (0 = all)"
        required: false
        default: "0"
        type: string
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean
      run_vision:
        description: "Also run vision fallback after text extraction"
        required: false
        default: "false"
        type: boolean
      run_nutrition:
        description: "Import USDA nutrition skimpflation as claims"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  extract-claims:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Extract claims (text)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS=""
          if [ -n "${{ github.event.inputs.source_type }}" ]; then
            FLAGS="$FLAGS --source-type ${{ github.event.inputs.source_type }}"
          fi
          if [ "${{ github.event.inputs.limit }}" != "0" ]; then
            FLAGS="$FLAGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python -m pipeline.scripts.extract_claims $FLAGS

      - name: Import nutrition claims
        if: ${{ github.event.inputs.run_nutrition == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline.scripts.import_nutrition_claims $FLAGS

      - name: Vision fallback
        if: ${{ github.event.inputs.run_vision == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline.scripts.extract_claims_vision $FLAGS
