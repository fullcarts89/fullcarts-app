name: "Pipeline — BLS R-CPI-SC Scraper"
on:
  schedule:
    # Monthly on the 5th at 06:00 UTC.
    # BLS updates quarterly (Jan/Apr/Jul/Oct); running monthly ensures we
    # catch each release within a few days.  The scraper itself enforces a
    # 25-day minimum between actual downloads, so extra runs are no-ops.
    - cron: "0 6 5 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  scrape-bls:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run BLS R-CPI-SC scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline bls_shrinkflation $FLAGS
