name: "Pipeline — FRED CPI Scraper"
on:
  schedule:
    - cron: "0 12 15 * *"  # Monthly on the 15th at 12:00 UTC
    # BLS releases CPI data mid-month; running on the 15th catches most releases.
    # If the 15th release hasn't landed yet, the next month's run will catch it
    # (idempotent upsert means no duplicates).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  scrape-fred-cpi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run FRED CPI scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Optional: set FRED_API_KEY secret for JSON API instead of public CSV
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline fred_cpi $FLAGS
