name: "Pipeline — Google Trends"
on:
  schedule:
    # Monthly on the 5th at 06:00 UTC. Trends rolls a 5-year window so
    # monthly cadence keeps the chart fresh without abusing the
    # unofficial API. Re-runs overwrite the full series (normalised
    # 0-100 values shift as the window moves).
    - cron: "0 6 5 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no database writes)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  scrape-google-trends:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "pipeline/requirements.txt"
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Run Google Trends scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python -m pipeline google_trends $FLAGS
